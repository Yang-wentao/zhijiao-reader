name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  source-archive:
    name: Source Archive
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Create source zip
        run: node scripts/create-release.mjs

      - name: Upload source archive to release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.zip

  electron-build:
    name: Electron (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Electron package
        run: npm run electron:pack

      - name: Upload Electron artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/electron/*.zip
            release/electron/*.AppImage
