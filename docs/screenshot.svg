  <g font-family="'PingFang SC', 'Noto Sans CJK SC', sans-serif" fill="#263140" font-size="16">
    <text x="1150" y="670">定理 1. 假设在模型 (1) 中，设计水平和随机误差分别满足条件 (2) 和</text>
    <text x="1150" y="700">(3)。假定回归函数 r(x, θ) 在包含 X × Θ 的开集内有界且连续。</text>
    <text x="1150" y="730">令 L 为序列 {xₙ} 的极限点集；注意 L 是一个依赖于 {xₙ}</text>
    <text x="1150" y="760">实现情况的随机集合。则贝叶斯估计量在事件 A 上是强相合的。</text>
  </g>

