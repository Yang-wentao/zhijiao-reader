  <g font-family="Georgia, 'Times New Roman', serif" fill="#33496E" font-size="16">
    <text x="1120" y="322">Theorem 1. Suppose that, in model (1), the design levels and the</text>
    <text x="1120" y="350">random errors satisfy (2) and (3), respectively. Assume that the</text>
    <text x="1120" y="378">regression function r(x, θ) is bounded and continuous in an open</text>
    <text x="1120" y="406">set of Rᵖ⁺ᑫ containing X × Θ. Let L be the set of limit points</text>
    <text x="1120" y="434">of the sequence {xₙ}; note that L is a random set that depends on</text>
    <text x="1120" y="462">the realisation of {xₙ}.</text>
  </g>

