  <text x="498" y="284" text-anchor="middle" fill="#262626" font-size="24" font-family="Georgia, 'Times New Roman', serif" font-weight="700">Miscellanea</text>
  <text x="870" y="284" fill="#262626" font-size="24" font-family="Georgia, 'Times New Roman', serif" font-weight="700">497</text>

  <g font-family="Georgia, 'Times New Roman', serif" fill="#202020" font-size="16">
    <text x="135" y="338">prior probability measure μ with support Θ, a subset of Rᵖ. Let design levels x be chosen from X,</text>
    <text x="135" y="366">a subset of Rᑫ. Let Q be the probability measure induced by random errors {εᵢ}. Consider the</text>
    <text x="135" y="394">following condition.</text>
    <text x="155" y="450" font-style="italic">Theorem 1.</text>
    <text x="270" y="450" font-style="italic">Suppose that, in model (1), the design levels and the random errors satisfy (2)</text>
    <text x="135" y="478" font-style="italic">and (3), respectively. Assume that the regression function r(x, θ) is bounded and continuous</text>
    <text x="135" y="506" font-style="italic">in an open set of Rᵖ⁺ᑫ containing X × Θ. Let L be the set of limit points of the sequence {xₙ};</text>
    <text x="135" y="534" font-style="italic">note that L is a random set that depends on the realisation of {xₙ}.</text>
    <text x="155" y="598" font-style="italic">Corollary 1.</text>
    <text x="288" y="598" font-style="italic">Let {xₙ}, {εₙ} and r(x, θ) be as in Theorem 1. Then for any x ∈ L the limiting</text>
    <text x="135" y="626" font-style="italic">posterior distribution of r(x, θ) is a point mass.</text>
    <text x="155" y="690" font-style="italic">Remark 1.</text>
    <text x="270" y="690">A set S satisfies Condition D if and only if the values of r(x, θ), x∈S, uniquely</text>
    <text x="135" y="718">determine θ. The fact that L is the set of limit points of {xₙ} means that the sequence {xₙ}</text>
    <text x="135" y="746">needs to “fill” a set satisfying Condition D infinitely often in order to estimate θ consistently.</text>
  </g>

